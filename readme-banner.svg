<svg xmlns="http://www.w3.org/2000/svg" width="830" height="400" viewBox="0 0 830 400">

  <rect width="830" height="400" fill="#0C0F14"/>

  <!-- Grid lines vertical -->
  <line x1="36"  y1="0" x2="36"  y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="72"  y1="0" x2="72"  y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="108" y1="0" x2="108" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="144" y1="0" x2="144" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="180" y1="0" x2="180" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="216" y1="0" x2="216" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="252" y1="0" x2="252" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="288" y1="0" x2="288" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="324" y1="0" x2="324" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="396" y1="0" x2="396" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="432" y1="0" x2="432" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="468" y1="0" x2="468" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="504" y1="0" x2="504" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="540" y1="0" x2="540" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="576" y1="0" x2="576" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="612" y1="0" x2="612" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="648" y1="0" x2="648" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="684" y1="0" x2="684" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="720" y1="0" x2="720" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="756" y1="0" x2="756" y2="400" stroke="#30363d" stroke-width="0.5"/>
  <line x1="792" y1="0" x2="792" y2="400" stroke="#30363d" stroke-width="0.5"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="36"  x2="830" y2="36"  stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="72"  x2="830" y2="72"  stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="108" x2="830" y2="108" stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="144" x2="830" y2="144" stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="180" x2="830" y2="180" stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="216" x2="830" y2="216" stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="252" x2="830" y2="252" stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="288" x2="830" y2="288" stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="324" x2="830" y2="324" stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="360" x2="830" y2="360" stroke="#30363d" stroke-width="0.5"/>
  <line x1="0" y1="396" x2="830" y2="396" stroke="#30363d" stroke-width="0.5"/>

  <!-- 10s cycle
    0.00-0.10 fade in  line1
    0.10-0.42 hold     line1
    0.42-0.50 fade out line1
    0.50-0.60 fade in  line2
    0.60-0.92 hold     line2
    0.92-1.00 fade out line2
  -->

  <!-- LINE 1: Hi, my name is Rex Espina -->
  <text text-anchor="middle" x="415" y="200"
    font-family="'Courier New', Courier, monospace"
    font-size="36" font-weight="bold" fill="#e6edf3">Hi, my name is Rex Espina
    <animate attributeName="opacity"
      values="0;1;1;0;0;0;0"
      keyTimes="0;0.10;0.32;0.40;0.50;0.92;1"
      dur="10s" repeatCount="indefinite"/>
  </text>

  <!-- LINE 2: I'm a + Associate Software Engineer -->
  <g>
    <animate attributeName="opacity"
      values="0;0;0;0;1;1;0"
      keyTimes="0;0.10;0.32;0.50;0.58;0.92;1"
      dur="10s" repeatCount="indefinite"/>

    <!-- "I'm a" white -->
    <text text-anchor="middle" x="415" y="178"
      font-family="'Courier New', Courier, monospace"
      font-size="32" font-weight="bold" fill="#e6edf3">I'm an</text>

    <!-- "Associate Software Engineer" blue -->
    <text text-anchor="middle" x="415" y="224"
      font-family="'Courier New', Courier, monospace"
      font-size="38" font-weight="bold" fill="#58a6ff">Associate Software Engineer</text>

    <!-- Blue underline -->
    <rect x="155" y="232" width="520" height="2" fill="#58a6ff" rx="1" opacity="0.6"/>
  </g>

</svg>
